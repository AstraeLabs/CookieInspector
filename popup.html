<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Inspector</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap');

    :root {
      --bg:       #0d0f14;
      --surface:  #141720;
      --border:   #252a38;
      --accent:   #5effa0;
      --accent2:  #5eb4ff;
      --text:     #c8d0e0;
      --muted:    #4a5270;
      --danger:   #ff5e7a;
      --key:      #5eb4ff;
      --str:      #ffd080;
      --num:      #5effa0;
      --bool:     #c97bff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 460px;
      min-height: 200px;
      max-height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #fff;
    }

    .logo-text span {
      color: var(--accent);
    }

    .domain-badge {
      font-size: 10px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .btn-get {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }

    .btn-get:hover  { opacity: .85; }
    .btn-get:active { transform: scale(.97); }

    .btn-get svg { flex-shrink: 0; }

    .btn-copy {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }

    .btn-copy:hover { color: var(--text); border-color: var(--muted); }
    .btn-copy.copied { color: var(--accent); border-color: var(--accent); }

    .count-badge {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .count-badge strong {
      color: var(--accent2);
    }

    .output-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .output-wrap::-webkit-scrollbar { width: 5px; }
    .output-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    .state-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 36px 0;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .state-empty .emoji { font-size: 32px; line-height: 1; }

    .state-error {
      color: var(--danger);
      background: rgba(255, 94, 122, .08);
      border: 1px solid rgba(255, 94, 122, .2);
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 12px;
    }

    .json-root {
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .j-brace   { color: var(--muted); }
    .j-key     { color: var(--key); }
    .j-str     { color: var(--str); }
    .j-num     { color: var(--num); }
    .j-bool    { color: var(--bool); }
    .j-null    { color: var(--muted); font-style: italic; }
    .j-comma   { color: var(--muted); }

    .j-entry {
      display: flex;
      gap: 4px;
      padding: 1px 4px;
      border-radius: 3px;
      transition: background .1s;
    }
    .j-entry:hover { background: rgba(255,255,255,.04); }

    .footer {
      padding: 7px 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .loading { animation: blink 1s infinite; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🍪</div>
      <div class="logo-text">Cookie<span>Inspector</span></div>
    </div>
    <div class="domain-badge" id="domain-badge">—</div>
  </div>

  <div class="toolbar">
    <button class="btn-get" id="btn-get">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <circle cx="6.5" cy="6.5" r="5.5" stroke="#0d0f14" stroke-width="1.6"/>
        <path d="M6.5 3.5V6.5L8.5 8" stroke="#0d0f14" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      GET COOKIES
    </button>

    <button class="btn-copy" id="btn-copy" disabled>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <rect x="4" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M3 8H2a1 1 0 01-1-1V2a1 1 0 011-1h5a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      COPY JSON
    </button>

    <div class="count-badge" id="count-badge" style="display:none">
      <strong id="count-num">0</strong> cookie
    </div>
  </div>

  <div class="output-wrap" id="output">
    <div class="state-empty">
      <div class="emoji">🔍</div>
      <div>Press <strong>GET COOKIES</strong><br>to read the cookies of the current site</div>
    </div>
  </div>

  <div class="footer">
    <span>Manifest V3 · Chrome · Firefox · Edge</span>
    <span id="footer-ts">—</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
